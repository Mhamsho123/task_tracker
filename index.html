<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

    <title>Task Manager Project</title>
  </head>
  <body>
    <div>
      <div class="heading-container">
        <h1 class="heading-title">Task Manager</h1>
        <h3 class="heading-details">
          Make tracking your projects easy and simple
        </h3>
      </div>

        <div>
            <div>

                <div class="add-btn-container">
                    <label for="add-task-btn">Add Task</label>
                    <button class="add-task-btn" id="add-task-btn">Add</button>
                </div>
                <form id="task-form">
                <div class="whole-modal-container">
                    <div class="modal-container">
                      <div class="modal-task-title-container">
                          <label for="modal-task-title" class="modal-task-text">Task Title</label>
                          <input class="modal-task-title" id="modal-task-title" type="text" placeholder="Schedule Call" required>
                      </div>
                        <div class="modal-description-container">
                          <label for="modal-description" class="modal-description-title">Task Description</label>
                          <textarea class="modal-description" id="modal-description" placeholder="Need to Schedule call with Nancy at 5pm"></textarea>
                        </div>

                        <!--Calendar Area-->
                        <div class="container" style="max-width: 250px;">
                          <div class="form-group m-1">
                              <label class="font-weight-bold" for="dob">
                                  Choose due date:
                              </label>
                  
                              <!-- Input field along with calendar icon -->
                              <div class="input-group">
                                  <!-- Calendar icon -->
                                  <span class="input-group-prepend">
                                      <span class="input-group-text">
                                          <i class="fa fa-calendar" 
                                             id="calendar-icon"></i>
                                      </span>
                                  </span>
                  
                                  <!-- Input field for the date -->
                                  <input class="form-control"
                                         type="text" id="dob" 
                                         placeholder="Select date" required>
                              </div>
                          </div>
                      </div>
                      <div class="submit-form-container">
                        <button type="submit" class="form-submit-btn" id="form-submit-btn">Create</button>
                      </div>
                    </div>
              
                </div>
                </form>

                <div class="tasks-container">
                    <div class="to-do-container" id="to-do-container">
                        <div class="to-do" id="to-do"></div>
                    </div>
                </div>
            </div>
        </div>

      </div>

      <div id="tasks"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="index.js" type="module"></script>
  </body>
</html>
