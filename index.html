<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Task Manager Project</title>
  </head>
  <body>
    <div>
      <div class="heading-container">
        <h1 class="heading-title">Task Manager</h1>
        <h3 class="heading-details">
          Make tracking your projects easy and simple
        </h3>
      </div>

        <div>
            <div>

                <div>
                    <label for="add-btn-container">Add Task</label>
                    <button class="add-task-btn" id="add-task-btn">Add</button>
                </div>
                <div class="whole-modal-container">
                    <div class="modal-container">
                        <div class="modal" id="modal">Modal Container</div>
                    </div>
                </div>

                <div class="tasks-container">
                    <div class="to-do-container" id="to-do-container">
                        <div class="to-do" id="to-do"></div>
                    </div>
                </div>
            </div>
        </div>

      </div>
    </div>
    <script src="index.js" type="module"></script>
  </body>
</html>
